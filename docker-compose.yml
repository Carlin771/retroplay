services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=3072"
      # O banco e o cache ficam no volume persistente /data.
      DATABASE_URL: "file:/data/app.db"
      CACHE_DIR: "/data/cache"
    volumes:
      - appdata:/data
    expose:
      - "3000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Defina SITE_DOMAIN no arquivo .env (ex.: malhacao.duckdns.org).
      SITE_DOMAIN: ${SITE_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  appdata:
  caddy_data:
  caddy_config:
